<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pair Nojoin Companion</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        padding: 20px;
        background-color: #f3f4f6;
        color: #1f2937;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        height: 100vh;
        margin: 0;
        box-sizing: border-box;
      }
      .container {
        background: white;
        padding: 28px 24px;
        border-radius: 12px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      }
      h2 {
        margin-top: 0;
        font-size: 1.35rem;
      }
      p {
        margin: 12px 0;
        font-size: 0.95rem;
        color: #4b5563;
      }
      .code {
        margin: 20px 0 10px;
        padding: 18px 16px;
        border-radius: 10px;
        background: #111827;
        color: white;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.2em;
      }
      .countdown {
        font-size: 0.9rem;
        color: #ea580c;
        font-weight: 600;
      }
      .hint {
        margin-top: 16px;
        padding: 12px;
        border-radius: 8px;
        background: #fff7ed;
        color: #9a3412;
        border: 1px solid #fdba74;
        font-size: 0.9rem;
      }
      .expired {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Pair with Nojoin</h2>
      <p>
        In Nojoin, open the manual pairing flow and enter this code.
      </p>
      <div class="code" id="pairingCode">---- ----</div>
      <div class="countdown" id="countdown">Code expires soon</div>
      <div class="hint">
        This code is single-use and only works while this window stays open.
        To switch to another Nojoin deployment later, start pairing again from
        the Companion app.
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const displayCode = urlParams.get("code") || "---- ----";
      const expiresIn = Number(urlParams.get("expires_in") || "300");
      const pairingCodeEl = document.getElementById("pairingCode");
      const countdownEl = document.getElementById("countdown");

      pairingCodeEl.textContent = displayCode;

      let remainingSeconds = Number.isFinite(expiresIn) ? expiresIn : 300;

      function renderCountdown() {
        if (remainingSeconds <= 0) {
          countdownEl.textContent = "Code expired. Start pairing again from the Companion app.";
          countdownEl.classList.add("expired");
          return;
        }

        const minutes = Math.floor(remainingSeconds / 60);
        const seconds = remainingSeconds % 60;
        countdownEl.textContent = `Code expires in ${minutes}:${String(seconds).padStart(2, "0")}`;
      }

      renderCountdown();
      window.setInterval(() => {
        remainingSeconds -= 1;
        renderCountdown();
      }, 1000);
    </script>
  </body>
</html>
