<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #eef2f7;
            --panel: #ffffff;
            --panel-border: #dbe3ee;
            --text: #162033;
            --muted: #64748b;
            --accent: #c2410c;
            --accent-strong: #9a3412;
            --danger: #b91c1c;
            --danger-soft: #fff1f2;
            --success: #166534;
            --success-soft: #ecfdf5;
            --info: #1d4ed8;
            --info-soft: #eff6ff;
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.14);
        }
        body {
            margin: 0;
            padding: 20px;
            background:
                radial-gradient(circle at top right, rgba(194, 65, 12, 0.14), transparent 42%),
                linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
            color: var(--text);
            font-family: "Segoe UI", "Inter", system-ui, sans-serif;
            box-sizing: border-box;
        }
        *, *::before, *::after {
            box-sizing: inherit;
        }
        .shell {
            width: min(500px, 100%);
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 22px;
        }
        h1 {
            margin: 0;
            font-size: 1.45rem;
            line-height: 1.1;
        }
        .subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 0.94rem;
            line-height: 1.45;
        }
        .grid {
            display: grid;
            gap: 12px;
            margin-top: 18px;
        }
        .card {
            padding: 14px 16px;
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(248, 250, 252, 0.95), rgba(241, 245, 249, 0.92));
        }
        .label {
            font-size: 0.77rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .value {
            margin-top: 6px;
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            word-break: break-word;
        }
        .actions {
            display: grid;
            gap: 10px;
            margin-top: 16px;
        }
        button {
            width: 100%;
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 11px 14px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 120ms ease, border-color 120ms ease, opacity 120ms ease;
        }
        button.primary {
            background: var(--accent);
            color: white;
        }
        button.primary:hover {
            background: var(--accent-strong);
        }
        button.secondary {
            background: #fff7ed;
            border-color: #fdba74;
            color: var(--accent-strong);
        }
        button.secondary:hover {
            background: #ffedd5;
        }
        button.danger {
            background: var(--danger-soft);
            border-color: #fecdd3;
            color: var(--danger);
        }
        button.danger:hover {
            background: #ffe4e6;
        }
        button[hidden] {
            display: none;
        }
        button:disabled {
            opacity: 0.6;
            cursor: wait;
        }
        .status {
            display: none;
            margin-top: 14px;
            padding: 11px 12px;
            border-radius: 12px;
            border: 1px solid transparent;
            font-size: 0.92rem;
            line-height: 1.4;
        }
        .status.visible {
            display: block;
        }
        .status.success {
            background: var(--success-soft);
            border-color: #bbf7d0;
            color: var(--success);
        }
        .status.error {
            background: var(--danger-soft);
            border-color: #fecdd3;
            color: var(--danger);
        }
        .status.info {
            background: var(--info-soft);
            border-color: #bfdbfe;
            color: var(--info);
        }
        .note {
            margin-top: 16px;
            font-size: 0.89rem;
            color: var(--muted);
            line-height: 1.45;
        }
    </style>
</head>
<body>
    <div class="shell">
        <h1>Settings</h1>
        <p class="subtitle">Manage this companion's backend connection and pairing state.</p>

        <div class="grid">
            <div class="card">
                <div class="label">Current Backend</div>
                <div class="value" id="backendValue">Loading...</div>
            </div>
            <div class="card">
                <div class="label">Pairing State</div>
                <div class="value" id="pairingStateValue">Loading...</div>
            </div>
        </div>

        <div class="actions">
            <button id="startPairingBtn" class="primary">Start Pairing</button>
            <button id="cancelPairingBtn" class="secondary" hidden>Cancel Local Pairing Session</button>
            <button id="disconnectBtn" class="danger" hidden>Disconnect Current Backend</button>
        </div>

        <div id="status" class="status"></div>

        <p class="note" id="noteText">Loading current pairing state...</p>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;

        const backendValue = document.getElementById('backendValue');
        const pairingStateValue = document.getElementById('pairingStateValue');
        const startPairingBtn = document.getElementById('startPairingBtn');
        const cancelPairingBtn = document.getElementById('cancelPairingBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const statusDiv = document.getElementById('status');
        const noteText = document.getElementById('noteText');
        const cancelPairingIdleLabel = 'Cancel Local Pairing Session';

        let resizeTimer = null;

        function scheduleResize() {
            window.clearTimeout(resizeTimer);
            resizeTimer = window.setTimeout(() => {
                void resizeToFit();
            }, 20);
        }

        async function resizeToFit() {
            const shell = document.querySelector('.shell');
            if (!shell) {
                return;
            }

            const width = Math.ceil(Math.max(380, shell.scrollWidth + 40));
            const height = Math.ceil(Math.max(250, document.documentElement.scrollHeight + 24));

            try {
                await invoke('resize_current_window', { width, height });
            } catch (_error) {
                // Ignore resize failures. The window still remains usable.
            }
        }

        function setStatus(message, type) {
            if (!message) {
                statusDiv.textContent = '';
                statusDiv.className = 'status';
                scheduleResize();
                return;
            }

            statusDiv.textContent = message;
            statusDiv.className = `status visible ${type}`;
            scheduleResize();
        }

        function setButtonBusy(button, busy, busyLabel, idleLabel) {
            button.disabled = busy;
            button.textContent = busy ? busyLabel : idleLabel;
        }

        function currentCancelPairingLabel() {
            return cancelPairingBtn.dataset.idleLabel || cancelPairingIdleLabel;
        }

        function renderSettings(view) {
            backendValue.textContent = view.backend_label;
            startPairingBtn.hidden = false;
            startPairingBtn.textContent = view.is_pairing_active
                ? 'Generate New Pairing Code'
                : view.is_paired
                    ? 'Start Re-pairing'
                    : 'Start Pairing';
            cancelPairingBtn.hidden = !view.is_pairing_active;
            disconnectBtn.hidden = !view.is_paired;
            cancelPairingBtn.dataset.idleLabel = cancelPairingIdleLabel;
            cancelPairingBtn.textContent = currentCancelPairingLabel();

            if (view.is_paired && view.is_pairing_active) {
                pairingStateValue.textContent = 'Connected, replacement code active';
                noteText.textContent = 'Complete pairing in Nojoin to replace the current backend. If you cancel now, the current backend stays active and unchanged.';
            } else if (view.is_paired) {
                pairingStateValue.textContent = 'Connected';
                noteText.textContent = 'Start re-pairing here to switch this companion to a different Nojoin deployment. The current backend remains active until the new pairing succeeds.';
            } else if (view.is_pairing_active) {
                pairingStateValue.textContent = 'Pairing code active';
                noteText.textContent = 'Finish pairing in Nojoin using the current code, or cancel this local pairing session here if you want to start over.';
            } else {
                pairingStateValue.textContent = 'Not paired';
                noteText.textContent = 'Start pairing here to connect this companion to a Nojoin deployment.';
            }

            scheduleResize();
        }

        async function loadSettings() {
            try {
                const settings = await invoke('get_settings_state');
                renderSettings(settings);
            } catch (e) {
                backendValue.textContent = 'Unavailable';
                pairingStateValue.textContent = 'Unavailable';
                setStatus('Failed to load settings: ' + e, 'error');
            }
        }

        startPairingBtn.addEventListener('click', async () => {
            try {
                const idleLabel = startPairingBtn.textContent;
                setButtonBusy(startPairingBtn, true, 'Opening Pairing...', idleLabel);

                await invoke('start_pairing_mode');

                setStatus(
                    idleLabel === 'Start Re-pairing' || idleLabel === 'Generate New Pairing Code'
                        ? 'Pairing window opened. Complete pairing in Nojoin to switch this companion to the selected backend. The current backend stays active until the new pairing succeeds.'
                        : 'Pairing window opened. Enter the displayed code in Nojoin to finish pairing.',
                    'success',
                );
                await loadSettings();
            } catch (e) {
                setStatus(String(e), 'error');
            } finally {
                await loadSettings();
                startPairingBtn.disabled = false;
            }
        });

        cancelPairingBtn.addEventListener('click', async () => {
            try {
                const idleLabel = currentCancelPairingLabel();
                setButtonBusy(cancelPairingBtn, true, 'Cancelling...', idleLabel);
                const message = await invoke('cancel_pairing_request');
                setStatus(message, 'info');
                await loadSettings();
            } catch (e) {
                setStatus(String(e), 'error');
            } finally {
                setButtonBusy(
                    cancelPairingBtn,
                    false,
                    'Cancelling...',
                    currentCancelPairingLabel(),
                );
            }
        });

        disconnectBtn.addEventListener('click', async () => {
            try {
                setButtonBusy(disconnectBtn, true, 'Disconnecting...', 'Disconnect Current Backend');
                const message = await invoke('disconnect_backend');
                setStatus(message, 'info');
                await loadSettings();
            } catch (e) {
                setStatus(String(e), 'error');
            } finally {
                setButtonBusy(disconnectBtn, false, 'Disconnecting...', 'Disconnect Current Backend');
            }
        });

        window.addEventListener('load', () => {
            void loadSettings();
            window.requestAnimationFrame(() => {
                window.requestAnimationFrame(() => {
                    void resizeToFit();
                });
            });
        });

        window.addEventListener('focus', () => {
            void loadSettings();
        });
    </script>
</body>
</html>
