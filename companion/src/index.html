<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nojoin Companion</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-soft: #f1f5f9;
            --panel-border: #cbd5e1;
            --text: #162033;
            --muted: #475569;
            --accent: #c2410c;
            --accent-strong: #9a3412;
            --accent-soft: #fff7ed;
            --success: #166534;
            --success-soft: #ecfdf5;
            --info: #1d4ed8;
            --info-soft: #eff6ff;
            --warning: #b45309;
            --warning-soft: #fff7ed;
            --danger: #b91c1c;
            --danger-soft: #fff1f2;
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.14);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --surface: #111c2d;
                --surface-soft: #1b283c;
                --panel-border: #334155;
                --text: #e2e8f0;
                --muted: #cbd5e1;
                --accent: #ea580c;
                --accent-strong: #fb923c;
                --accent-soft: rgba(234, 88, 12, 0.18);
                --success: #4ade80;
                --success-soft: rgba(34, 197, 94, 0.18);
                --info: #60a5fa;
                --info-soft: rgba(59, 130, 246, 0.2);
                --warning: #f59e0b;
                --warning-soft: rgba(245, 158, 11, 0.18);
                --danger: #f87171;
                --danger-soft: rgba(248, 113, 113, 0.18);
                --shadow: 0 18px 40px rgba(2, 6, 23, 0.36);
            }
        }
        body {
            margin: 0;
            padding: 18px 20px;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "Inter", system-ui, sans-serif;
            box-sizing: border-box;
        }
        *, *::before, *::after {
            box-sizing: inherit;
        }
        .shell {
            width: min(460px, 100%);
            padding: 0;
        }
        .hero {
            margin-top: 0;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 6px 12px;
            border: 1px solid transparent;
            border-radius: 999px;
            font-size: 0.86rem;
            font-weight: 700;
            line-height: 1;
        }
        .summary-status {
            margin-top: 10px;
        }
        h1 {
            margin: 0;
            font-size: 1.42rem;
            line-height: 1.1;
        }
        .lead {
            margin: 14px 0 0;
            color: var(--text);
            font-size: 0.97rem;
            line-height: 1.5;
        }
        .summary-grid {
            display: grid;
            gap: 0;
            margin-top: 18px;
            border-top: 1px solid var(--panel-border);
        }
        .summary-card {
            padding: 14px 0;
            border-bottom: 1px solid var(--panel-border);
            background: transparent;
        }
        .summary-label {
            display: block;
            color: var(--muted);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .summary-value {
            display: block;
            margin-top: 6px;
            color: var(--text);
            font-size: 0.98rem;
            font-weight: 700;
            line-height: 1.4;
            word-break: break-word;
        }
        .status-message {
            display: none;
            margin-top: 14px;
            padding: 11px 12px;
            border: 1px solid transparent;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.42;
        }
        .status-message.visible {
            display: block;
        }
        .status-message.error {
            background: var(--danger-soft);
            border-color: color-mix(in srgb, var(--danger) 38%, transparent);
            color: var(--danger);
        }
        .status-message.info {
            background: var(--info-soft);
            border-color: color-mix(in srgb, var(--info) 38%, transparent);
            color: var(--info);
        }
        .actions {
            display: grid;
            gap: 10px;
            margin-top: 18px;
            padding-top: 2px;
        }
        button {
            width: 100%;
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 11px 14px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease, opacity 120ms ease;
        }
        button.primary {
            background: var(--accent);
            color: white;
        }
        button.primary:hover {
            background: var(--accent-strong);
        }
        button.secondary {
            background: var(--surface);
            border-color: var(--panel-border);
            color: var(--text);
        }
        button.secondary:hover {
            background: var(--surface-soft);
        }
        button[hidden] {
            display: none;
        }
        button:disabled {
            opacity: 0.68;
            cursor: wait;
        }
        .shell[data-tone="setup"] .status-pill {
            background: var(--accent-soft);
            border-color: color-mix(in srgb, var(--accent-strong) 40%, transparent);
            color: var(--accent-strong);
        }
        .shell[data-tone="healthy"] .status-pill {
            background: var(--success-soft);
            border-color: color-mix(in srgb, var(--success) 40%, transparent);
            color: var(--success);
        }
        .shell[data-tone="informational"] .status-pill {
            background: var(--info-soft);
            border-color: color-mix(in srgb, var(--info) 40%, transparent);
            color: var(--info);
        }
        .shell[data-tone="warning"] .status-pill {
            background: var(--warning-soft);
            border-color: color-mix(in srgb, var(--warning) 40%, transparent);
            color: var(--warning);
        }
        .shell[data-tone="critical"] .status-pill {
            background: var(--danger-soft);
            border-color: #fecdd3;
            color: var(--danger);
        }
    </style>
</head>
<body>
    <div class="shell" data-tone="setup">
        <div class="hero">
            <h1 id="title">Nojoin Companion</h1>
            <p class="lead" id="lead">Loading current launcher state...</p>
        </div>

        <div class="summary-grid">
            <div class="summary-card">
                <span class="summary-label">Current Backend</span>
                <span class="summary-value" id="backendValue">Loading...</span>
                <div class="status-pill summary-status" id="backendStatusPill">Loading...</div>
            </div>
        </div>

        <div id="statusMessage" class="status-message" aria-live="polite"></div>

        <div class="actions">
            <button id="primaryActionBtn" class="primary" type="button">Loading...</button>
            <button id="secondaryActionBtn" class="secondary" type="button" hidden></button>
        </div>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;
        const shell = document.querySelector('.shell');
        const title = document.getElementById('title');
        const lead = document.getElementById('lead');
        const backendValue = document.getElementById('backendValue');
        const backendStatusPill = document.getElementById('backendStatusPill');
        const statusMessage = document.getElementById('statusMessage');
        const primaryActionBtn = document.getElementById('primaryActionBtn');
        const secondaryActionBtn = document.getElementById('secondaryActionBtn');

        let resizeTimer = null;
        let refreshTimer = null;
        let actionInFlight = false;

        const actionLabels = {
            'start-pairing': 'Start Pairing',
            'open-nojoin': 'Open Nojoin',
            'open-settings': 'Open Settings',
            'open-settings-to-repair': 'Open Settings to Repair',
        };

        const launcherCopy = {
            'first-run': {
                tone: 'setup',
                statusLabel: 'Not paired',
                title: 'Nojoin Companion',
                lead: 'This companion app connects to your browser to allow you to record your meetings without having a bot join and then it sends these recordings to your browser for processing. Start pairing now, or reopen this window later from the tray.',
                secondaryAction: 'open-settings',
            },
            'unpaired': {
                tone: 'setup',
                statusLabel: 'Not paired',
                title: 'Nojoin Companion',
                lead: 'This companion app connects to your browser to allow you to record your meetings without having a bot join and then it sends these recordings to your browser for processing. Start pairing from here, or reopen this window later from the tray.',
                secondaryAction: 'open-settings',
            },
            'pairing-active': {
                tone: 'informational',
                statusLabel: 'Pairing code active',
                title: 'Nojoin Companion',
                lead: 'Finish pairing in Nojoin with the current code. If this is replacing an older backend, the current backend stays active until the new pairing succeeds.',
                secondaryAction: 'open-settings',
            },
            'paired-healthy': {
                tone: 'healthy',
                statusLabel: 'Connected',
                title: 'Nojoin Companion',
                lead: 'Open Nojoin to return to the paired workspace, or use Settings for support and configuration.',
                secondaryAction: 'open-settings',
            },
            'paired-disconnected': {
                tone: 'informational',
                statusLabel: 'Temporarily disconnected',
                title: 'Nojoin Companion',
                lead: 'This device is still paired and will resync automatically when the backend connection returns. Open Settings if you need help right now.',
                secondaryAction: 'open-nojoin',
            },
            'local-https-repairing': {
                tone: 'warning',
                statusLabel: 'Browser repair in progress',
                title: 'Nojoin Companion',
                lead: 'Companion is reconciling the secure local browser connection. Browser controls will refresh automatically when repair finishes.',
                secondaryAction: null,
            },
            'local-https-needs-repair': {
                tone: 'critical',
                statusLabel: 'Browser repair required',
                title: 'Nojoin Companion',
                lead: 'Open Settings to repair the secure local browser connection before using browser-side local controls again.',
                secondaryAction: 'open-settings',
            },
        };

        function formatError(error) {
            if (typeof error === 'string') {
                return error;
            }

            if (error && typeof error.message === 'string') {
                return error.message;
            }

            return 'The launcher action could not be completed.';
        }

        function setStatusMessage(message, type = 'info') {
            if (!message) {
                statusMessage.textContent = '';
                statusMessage.className = 'status-message';
                return;
            }

            statusMessage.textContent = message;
            statusMessage.className = `status-message visible ${type}`;
        }

        function setButtonState(button, actionKey) {
            if (!actionKey) {
                button.hidden = true;
                button.textContent = '';
                button.dataset.action = '';
                return;
            }

            button.hidden = false;
            button.textContent = actionLabels[actionKey];
            button.dataset.action = actionKey;
        }

        function renderLauncherState(state) {
            const copy = launcherCopy[state.launcherMode] || launcherCopy['unpaired'];
            const backendDisplay = state.isPaired ? state.backendLabel : 'No backend connected';

            shell.dataset.tone = copy.tone;
            setStatusMessage('');
            title.textContent = copy.title;
            lead.textContent = copy.lead;
            backendValue.textContent = backendDisplay;
            backendStatusPill.textContent = copy.statusLabel;

            setButtonState(primaryActionBtn, state.primaryAction);
            setButtonState(secondaryActionBtn, copy.secondaryAction);

            primaryActionBtn.disabled = actionInFlight;
            secondaryActionBtn.disabled = actionInFlight;

            scheduleResize();
        }

        function renderUnavailableState(message) {
            shell.dataset.tone = 'critical';
            title.textContent = 'Nojoin Companion';
            lead.textContent = 'Companion could not load the current launcher state.';
            backendValue.textContent = 'Unavailable';
            backendStatusPill.textContent = 'Launcher unavailable';
            setButtonState(primaryActionBtn, 'open-settings');
            setButtonState(secondaryActionBtn, null);
            primaryActionBtn.disabled = actionInFlight;
            setStatusMessage(message, 'error');
            scheduleResize();
        }

        async function loadLauncherState() {
            try {
                const state = await invoke('get_launcher_state');
                renderLauncherState({
                    backendLabel: state.backend_label,
                    isPaired: state.is_paired,
                    localHttpsStatus: state.localHttpsStatus,
                    launcherMode: state.launcherMode,
                    primaryAction: state.primaryAction,
                });
            } catch (error) {
                renderUnavailableState(formatError(error));
            }
        }

        async function runAction(actionKey) {
            if (!actionKey || actionInFlight) {
                return;
            }

            actionInFlight = true;
            primaryActionBtn.disabled = true;
            secondaryActionBtn.disabled = true;
            setStatusMessage('');

            try {
                if (actionKey === 'start-pairing') {
                    await invoke('start_pairing_mode');
                    await loadLauncherState();
                } else if (actionKey === 'open-nojoin') {
                    await invoke('open_nojoin');
                } else if (actionKey === 'open-settings' || actionKey === 'open-settings-to-repair') {
                    await invoke('open_settings');
                }
            } catch (error) {
                setStatusMessage(formatError(error), 'error');
            } finally {
                actionInFlight = false;
                primaryActionBtn.disabled = false;
                secondaryActionBtn.disabled = false;
                scheduleResize();
            }
        }

        function scheduleResize() {
            window.clearTimeout(resizeTimer);
            resizeTimer = window.setTimeout(() => {
                void resizeToFit();
            }, 20);
        }

        async function resizeToFit() {
            if (!shell) {
                return;
            }

            const shellRect = shell.getBoundingClientRect();
            const bodyStyle = window.getComputedStyle(document.body);
            const horizontalPadding = parseFloat(bodyStyle.paddingLeft) + parseFloat(bodyStyle.paddingRight);
            const verticalPadding = parseFloat(bodyStyle.paddingTop) + parseFloat(bodyStyle.paddingBottom);
            const width = Math.ceil(Math.max(360, shellRect.width + horizontalPadding));
            const height = Math.ceil(Math.max(220, shellRect.height + verticalPadding));

            try {
                await invoke('resize_current_window', { width, height });
            } catch (_error) {
                // Ignore resize failures. The launcher remains usable.
            }
        }

        function startRefreshLoop() {
            window.clearInterval(refreshTimer);
            refreshTimer = window.setInterval(() => {
                if (!document.hidden && !actionInFlight) {
                    void loadLauncherState();
                }
            }, 4000);
        }

        primaryActionBtn.addEventListener('click', () => {
            void runAction(primaryActionBtn.dataset.action);
        });

        secondaryActionBtn.addEventListener('click', () => {
            void runAction(secondaryActionBtn.dataset.action);
        });

        window.addEventListener('load', () => {
            void loadLauncherState();
            startRefreshLoop();

            window.requestAnimationFrame(() => {
                window.requestAnimationFrame(() => {
                    void resizeToFit();
                });
            });
        });

        window.addEventListener('focus', () => {
            if (!actionInFlight) {
                void loadLauncherState();
            }
            scheduleResize();
        });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && !actionInFlight) {
                void loadLauncherState();
                scheduleResize();
            }
        });

        if ('ResizeObserver' in window && shell) {
            const resizeObserver = new ResizeObserver(() => {
                scheduleResize();
            });
            resizeObserver.observe(shell);
        }
    </script>
</body>
</html>
