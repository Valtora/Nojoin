# Dependabot keeps Nojoin's supply chain current without manual tracking.
#
# Notes:
# - GitHub Actions are pinned to commit SHAs in the workflows. Dependabot
#   updates those SHAs in place and keeps the trailing `# vX.Y.Z` comment
#   accurate, so SHA pinning does not mean the actions go stale.
# - Docker base images are pinned by digest in the Dockerfiles. Dependabot
#   bumps the digest (and tag comment) when a new image is published.
# - Updates are grouped where practical to keep pull-request volume reviewable.
version: 2

updates:
  # --- GitHub Actions used by CI and the release workflow ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"

  # --- Python dependencies (split requirement files) ---
  - package-ecosystem: pip
    directory: /requirements
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
    groups:
      python-dependencies:
        patterns:
          - "*"
    # Held pins (see PR #43). Remove an entry when its blocker clears.
    ignore:
      # torchaudio publishes no 2.12.x; 2.11.0 is the matched-stack ceiling.
      - dependency-name: "torch"
        versions: [">=2.12.0"]
      # torchcodec stays matched to torch 2.11 (the 0.11.x line).
      - dependency-name: "torchcodec"
        versions: [">=0.12.0"]
      # numpy 2.5 forces an ancient numba that breaks the openai-whisper resolve.
      - dependency-name: "numpy"
        versions: [">=2.5.0"]

  # --- Frontend npm dependencies ---
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
    groups:
      npm-development:
        dependency-type: development
      npm-production:
        dependency-type: production
    # Held pins (see PR #43). Remove an entry when its blocker clears.
    ignore:
      # eslint 10 + the new React-Compiler lint rules need a code migration first.
      - dependency-name: "eslint"
        versions: [">=10.0.0"]
      # react-resizable-panels 4 is an API redesign (Group/Separator).
      - dependency-name: "react-resizable-panels"
        versions: [">=4.0.0"]

  # --- Container base images ---
  - package-ecosystem: docker
    directories:
      - /docker
      - /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
    groups:
      docker-base-images:
        patterns:
          - "*"
    # Held pin (see PR #43). Remove when torchaudio ships a 2.12.x release.
    ignore:
      - dependency-name: "pytorch/pytorch"
        versions: [">=2.12.0"]
