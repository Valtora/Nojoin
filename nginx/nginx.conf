events {
    worker_connections 1024;
}

http {
    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name localhost;
        # Redirect HTTP to HTTPS on port 14443
        return 301 https://$host:14443$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/cert.crt;
        ssl_certificate_key /etc/nginx/certs/cert.key;

        add_header Strict-Transport-Security "max-age=31536000" always;

        # Increase max body size for audio uploads
        client_max_body_size 500M;

        # API Proxy
        location /api/ {
            # Use variables to prevent Nginx from crashing if containers are down
            set $api_upstream http://api:8000;
            proxy_pass $api_upstream;
            proxy_hide_header X-Powered-By;
            add_header Content-Security-Policy "default-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Permissions-Policy "camera=(), geolocation=(), payment=(), usb=()" always;
            
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Fix for LLM Streaming (SSE) timeouts
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering off;
        }

        # Frontend Proxy
        location / {
            # Use variables to prevent Nginx from crashing if containers are down
            set $frontend_upstream http://frontend:14141;
            proxy_pass $frontend_upstream;
            proxy_hide_header X-Powered-By;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;

            # WebSocket support for Next.js HMR
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
