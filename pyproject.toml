[tool.pytest.ini_options]
pythonpath = [
  "."
]
testpaths = [
  "backend/tests"
]
markers = [
  "pipeline_baseline: marker for pipeline baseline evaluation metrics"
]

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
select = [
    "F",   # pyflakes (correctness/logic errors)
    "BLE", # blind-except (BLE001)
]
ignore = [
    "F403", "F405", "F821", "F841", "F401", "F811"
]
