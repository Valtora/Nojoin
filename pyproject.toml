[tool.pytest.ini_options]
pythonpath = [
  "."
]
testpaths = [
  "backend/tests"
]
markers = [
  "pipeline_baseline: marker for pipeline baseline evaluation metrics"
]

[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = [
    "F",   # pyflakes (correctness/logic errors)
    "BLE", # blind-except (BLE001)
    "I",   # import sorting
]
ignore = [
    "F403", "F405"
]

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
warn_unused_ignores = true
warn_return_any = true
check_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true
follow_imports = "skip"
files = [
  "backend/api/error_handling.py",
  "backend/api/services/release_service.py",
  "backend/api/v1/endpoints/version.py",
  "backend/utils/deployment_warnings.py",
  "backend/utils/languages.py",
  "backend/utils/ollama_url_policy.py",
  "backend/utils/speaker_assignment.py",
]
